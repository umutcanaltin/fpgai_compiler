version: 1
project:
  name: fpgai_example_dense
  out_dir: /home/umutcanaltin/Desktop/github_projects/fpgai_compiler/experiments/sprint12c_parallel_policy_strategy/artifacts/parallel_throughput_first/build
  clean: true
  reproducibility:
    emit_manifest: true
pipeline:
  mode: inference
  outputs:
    top_kernel_name: deeplearn
model:
  format: onnx
  path: models/cnn_mnist.onnx
targets:
  platform:
    board: kv260
    part: xck26-sfvc784-2LV-c
    clocks:
    - name: pl_clk0
      target_mhz: 200
operators:
  supported:
  - Dense
  - Conv
  - MaxPool
  - AvgPool
  - Add
  - Relu
  - LeakyRelu
  - Sigmoid
  - Softmax
  - BatchNormalization
  - Flatten
  - Reshape
  defaults:
    activation_insert:
      kind: none
      alpha: 0.1
      except_last: true
numerics:
  defaults:
    activation:
      type: ap_fixed
      total_bits: 8
      int_bits: 3
    weight:
      type: ap_fixed
      total_bits: 8
      int_bits: 3
    bias:
      type: ap_fixed
      total_bits: 16
      int_bits: 6
    accum:
      type: ap_fixed
      total_bits: 16
      int_bits: 6
  layers:
  - match:
      op_type: Conv
    activation:
      type: ap_fixed
      total_bits: 16
      int_bits: 6
    weight:
      type: ap_fixed
      total_bits: 14
      int_bits: 5
    bias:
      type: ap_fixed
      total_bits: 20
      int_bits: 8
    accum:
      type: ap_fixed
      total_bits: 24
      int_bits: 10
  - match:
      op_type: Dense
    activation:
      type: ap_fixed
      total_bits: 14
      int_bits: 5
    weight:
      type: ap_fixed
      total_bits: 12
      int_bits: 4
    bias:
      type: ap_fixed
      total_bits: 20
      int_bits: 8
    accum:
      type: ap_fixed
      total_bits: 24
      int_bits: 10
  - match:
      op_type: Sigmoid
    activation:
      type: ap_fixed
      total_bits: 16
      int_bits: 4
  - match:
      op_type: Softmax
    activation:
      type: ap_fixed
      total_bits: 16
      int_bits: 6
    accum:
      type: ap_fixed
      total_bits: 24
      int_bits: 10
  training:
    grad:
      type: ap_fixed
      total_bits: 24
      int_bits: 10
    grad_accum:
      type: ap_fixed
      total_bits: 24
      int_bits: 10
    master_weight:
      type: ap_fixed
      total_bits: 16
      int_bits: 6
    optimizer_state:
      type: ap_fixed
      total_bits: 24
      int_bits: 10
analysis:
  quantization_report:
    enabled: true
    seed: 0
  hls_calibration:
    enabled: true
    output_dir: calibration
    fail_on_empty: false
    fail_on_error: false
  precision_sweep:
    enabled: true
    layer_overrides: clear
    require_prediction_match: true
    minimum_cosine: 0.99
    candidates:
    - name: fx8_3
      defaults:
        activation:
          type: ap_fixed
          total_bits: 8
          int_bits: 3
        weight:
          type: ap_fixed
          total_bits: 8
          int_bits: 3
        bias:
          type: ap_fixed
          total_bits: 16
          int_bits: 6
        accum:
          type: ap_fixed
          total_bits: 16
          int_bits: 6
    - name: fx10_4
      defaults:
        activation:
          type: ap_fixed
          total_bits: 10
          int_bits: 4
        weight:
          type: ap_fixed
          total_bits: 10
          int_bits: 4
        bias:
          type: ap_fixed
          total_bits: 18
          int_bits: 7
        accum:
          type: ap_fixed
          total_bits: 20
          int_bits: 8
    - name: fx12_4
      defaults:
        activation:
          type: ap_fixed
          total_bits: 12
          int_bits: 4
        weight:
          type: ap_fixed
          total_bits: 12
          int_bits: 4
        bias:
          type: ap_fixed
          total_bits: 20
          int_bits: 8
        accum:
          type: ap_fixed
          total_bits: 24
          int_bits: 10
    - name: fx14_5
      defaults:
        activation:
          type: ap_fixed
          total_bits: 14
          int_bits: 5
        weight:
          type: ap_fixed
          total_bits: 14
          int_bits: 5
        bias:
          type: ap_fixed
          total_bits: 22
          int_bits: 9
        accum:
          type: ap_fixed
          total_bits: 24
          int_bits: 10
    - name: fx16_6
      defaults:
        activation:
          type: ap_fixed
          total_bits: 16
          int_bits: 6
        weight:
          type: ap_fixed
          total_bits: 16
          int_bits: 6
        bias:
          type: ap_fixed
          total_bits: 24
          int_bits: 10
        accum:
          type: ap_fixed
          total_bits: 24
          int_bits: 10
  design_space:
    enabled: true
    print_terminal_summary: true
    recommendation:
      require_prediction_match: true
      min_cosine: 0.99
    performance:
      baseline_cpu_latency_ms: 1.6
data_movement:
  ps_pl:
    compression:
      enabled: true
    weights:
      mode: embedded
memory:
  storage:
    weights: bram
    activations: bram
    gradients: bram
    optimizer_state: bram
  strategy: on_chip
  weight_storage: embedded
  weight_region_preference:
  - BRAM
  - URAM
  - DDR
  activation_region_preference:
  - BRAM
  - URAM
  - DDR
  allow_double_buffer: false
optimization:
  parallel_policy: Throughput-First
  parallel:
    pe: 2
    simd: 4
    unroll_factor: 2
    partition_factor: 4
    pipeline_style: aggressive
training:
  optimizer:
    type: sgd
    learning_rate: 0.01
  loss:
    type: mse
  execution:
    batch_size: 1
    epochs: 1
  storage:
    weights: bram
    activations: bram
    gradients: bram
    optimizer_state: bram
  cache:
    store_forward_activations: true
    store_pre_activations: true
    store_pool_indices: true
    gradient_checkpointing: false
    store_step_snapshots: true
  estimator:
    enabled: true
    include_forward: true
    include_backward_input: true
    include_backward_params: true
    include_update: true
    include_buffers: true
  phase_overrides: {}
backends:
  hls:
    enabled: true
    vitis:
      enabled: true
      mode: csim
      exe: vitis_hls
  host_cpp:
    enabled: true
toolchain:
  vitis_hls:
    enabled: true
    root: /tools/Xilinx/Vitis_HLS/2023.2
    settings64: /tools/Xilinx/Vitis_HLS/2023.2/settings64.sh
    install_dir: /tools/Xilinx/Vitis_HLS/2023.2
benchmark:
  enabled: true
  fail_on_mismatch: true
  seed: 0
  compare:
    atol: 0.08
    rtol: 0.08
    max_abs_error: 0.08
    mean_abs_error: 0.03
    rmse: 0.04
    require_argmax_match: false
    min_cosine_similarity: 0.95
  intermediate:
    enabled: true
    fail_on_layer_mismatch: false
    stop_on_first_bad_layer: false
debug:
  verbose: false
