name: parallelism_feasible_envelope
command_template: PYTHONPATH=. python -B main.py benchmark --config {config_path}

materialize_configs:
  enabled: true
  directory: configs
  strip_unknown_top_level_sections: true
  canonicalize_policy: true
  strip_top_level_sections:
    - notes
  compiler_policy_names: true
  parameter_mappings:
    model_path:
      path: model.path
      create: true
    weight_mode:
      path: data_movement.ps_pl.weights.mode
      create: true
    learning_rate:
      path: training.optimizer.learning_rate
      create: true
    epochs:
      path: training.execution.epochs
      create: true
    train_steps:
      path: training.execution.train_steps
      create: true
    batch_size:
      path: training.execution.batch_size
      create: true
    batch_mode:
      path: training.execution.batch_mode
      create: true
    dump_intermediates:
      path: training.debug.dump_intermediates
      create: true
    policy:
      path: optimization.parallel_policy
      create: true
    pe:
      path: optimization.parallel.pe
      create: true
    simd:
      path: optimization.parallel.simd
      create: true
    unroll_factor:
      path: optimization.parallel.unroll_factor
      create: true
    partition_factor:
      path: optimization.parallel.partition_factor
      create: true
    pipeline_style:
      path: optimization.parallel.pipeline_style
      create: true

    activation_total_bits:
      path: numerics.defaults.activation.total_bits
      create: true
    activation_int_bits:
      path: numerics.defaults.activation.int_bits
      create: true
    weight_total_bits:
      path: numerics.defaults.weight.total_bits
      create: true
    weight_int_bits:
      path: numerics.defaults.weight.int_bits
      create: true
    bias_total_bits:
      path: numerics.defaults.bias.total_bits
      create: true
    bias_int_bits:
      path: numerics.defaults.bias.int_bits
      create: true
    accum_total_bits:
      path: numerics.defaults.accum.total_bits
      create: true
    accum_int_bits:
      path: numerics.defaults.accum.int_bits
      create: true
    grad_total_bits:
      path: numerics.training.grad.total_bits
      create: true
    grad_int_bits:
      path: numerics.training.grad.int_bits
      create: true
    grad_accum_total_bits:
      path: numerics.training.grad_accum.total_bits
      create: true
    grad_accum_int_bits:
      path: numerics.training.grad_accum.int_bits
      create: true
    master_weight_total_bits:
      path: numerics.training.master_weight.total_bits
      create: true
    master_weight_int_bits:
      path: numerics.training.master_weight.int_bits
      create: true

defaults:
  base_config_path: fpgai_train.yml
  config_path: fpgai_train.yml
  board: kv260
  model_path: models/cnn_mnist.onnx
  weight_mode: stream

  learning_rate: 0.005
  epochs: 2
  train_steps: 2
  batch_size: 2
  batch_mode: accumulated
  dump_intermediates: true

  activation_total_bits: 24
  activation_int_bits: 12
  weight_total_bits: 20
  weight_int_bits: 8
  bias_total_bits: 32
  bias_int_bits: 16
  accum_total_bits: 40
  accum_int_bits: 20
  grad_total_bits: 32
  grad_int_bits: 16
  grad_accum_total_bits: 40
  grad_accum_int_bits: 20
  master_weight_total_bits: 24
  master_weight_int_bits: 10

  pipeline_style: balanced

design_points:
  - name: hw_parallel_1_feasible
    policy: resource_first
    pe: 1
    simd: 1
    unroll_factor: 1
    partition_factor: 1
    pipeline_style: conservative

  - name: hw_parallel_2_feasible
    policy: balanced
    pe: 2
    simd: 2
    unroll_factor: 2
    partition_factor: 2
    pipeline_style: balanced

  - name: hw_parallel_3_candidate
    policy: latency_first
    pe: 3
    simd: 3
    unroll_factor: 3
    partition_factor: 3
    pipeline_style: balanced

  - name: hw_parallel_4_expected_resource_fail
    policy: latency_first
    pe: 4
    simd: 4
    unroll_factor: 4
    partition_factor: 4
    pipeline_style: aggressive
