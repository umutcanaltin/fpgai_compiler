name: inference_precision
command_template: python main.py benchmark --config {config_path}
materialize_configs:
  enabled: true
  directory: configs
  strip_unknown_top_level_sections: true
  canonicalize_policy: true
  strip_top_level_sections:
  - notes
  compiler_policy_names: true
defaults:
  base_config_path: fpgai.yml
  config_path: fpgai.yml
  model_path: models/cnn_mnist.onnx
  board: kv260
  metrics_json: build/fpgai_example_dense/calibration/estimate_vs_hls.json
  policy: balanced
design_name_template: precision_{precision_mode}_{policy}
parameters:
  precision_mode:
  - fx8_3
  - fx16_6
  policy:
  - balanced
  - latency_first
description: 'Sprint 9 focused precision-effect sweep: compares fx8_3 and fx16_6 under
  balanced and latency_first policies.'
