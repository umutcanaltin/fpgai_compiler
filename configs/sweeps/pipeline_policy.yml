name: pipeline_policy
command_template: PYTHONPATH=. python -B main.py benchmark --config {config_path}

materialize_configs:
  enabled: true
  directory: configs
  strip_unknown_top_level_sections: true
  canonicalize_policy: true
  strip_top_level_sections:
    - notes
  compiler_policy_names: true
  parameter_mappings:
    model_path:
      path: model.path
      create: true
    weight_mode:
      path: data_movement.ps_pl.weights.mode
      create: true
    learning_rate:
      path: training.optimizer.learning_rate
      create: true
    epochs:
      path: training.execution.epochs
      create: true
    train_steps:
      path: training.execution.train_steps
      create: true
    batch_size:
      path: training.execution.batch_size
      create: true
    batch_mode:
      path: training.execution.batch_mode
      create: true
    dump_intermediates:
      path: training.debug.dump_intermediates
      create: true
    policy:
      path: optimization.parallel_policy
      create: true
    pe:
      path: optimization.parallel.pe
      create: true
    simd:
      path: optimization.parallel.simd
      create: true
    unroll_factor:
      path: optimization.parallel.unroll_factor
      create: true
    partition_factor:
      path: optimization.parallel.partition_factor
      create: true
    pipeline_style:
      path: optimization.parallel.pipeline_style
      create: true

defaults:
  base_config_path: configs/examples/training_compile_smoke.yml
  config_path: configs/examples/training_compile_smoke.yml
  board: kv260
  model_path: models/cnn_mnist.onnx
  weight_mode: stream
  learning_rate: 0.005
  epochs: 2
  train_steps: 2
  batch_size: 2
  batch_mode: accumulated
  dump_intermediates: true
  # Keep parallelism fixed so only policy/pipeline style changes.
  pe: 2
  simd: 2
  unroll_factor: 2
  partition_factor: 2

# This isolates whether policy/pipeline style alone changes HLS/Vivado experiment artifact.
design_points:
  - name: hw_pipeline_conservative_only
    policy: resource_first
    pipeline_style: conservative

  - name: hw_pipeline_balanced_only
    policy: balanced
    pipeline_style: balanced

  - name: hw_pipeline_aggressive_only
    policy: throughput_first
    pipeline_style: aggressive
