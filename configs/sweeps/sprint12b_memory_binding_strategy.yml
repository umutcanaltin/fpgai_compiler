name: sprint12b_memory_binding_strategy
command_template: python main.py benchmark --config {config_path}

materialize_configs:
  enabled: true
  directory: configs
  strip_unknown_top_level_sections: true
  canonicalize_policy: true
  strip_top_level_sections:
    - notes
  compiler_policy_names: true

defaults:
  base_config_path: fpgai.yml
  config_path: fpgai.yml
  model_path: models/cnn_mnist.onnx
  board: kv260
  precision_mode: fx8_3
  policy: balanced

# These points test whether memory strategy changes become real HLS storage
# directives, not only planner comments.
design_points:
  - name: memory_on_chip_bram_baseline
    memory_strategy: on_chip
    weight_storage: embedded
    policy: balanced

  - name: memory_bram_saver_balanced
    memory_strategy: bram_saver
    weight_storage: embedded
    policy: balanced

  - name: memory_uram_first_balanced
    memory_strategy: uram_first
    weight_storage: stream
    policy: balanced

  - name: memory_uram_first_latency_first
    memory_strategy: uram_first
    weight_storage: stream
    policy: latency_first
