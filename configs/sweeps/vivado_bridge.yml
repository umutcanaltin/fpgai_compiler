# Vivado bridge marker config.
# This update is driven by scripts/run_vivado_bridge.py on top of an existing
# FPGAI experiment directory. Full integration into run_fpgai_experiments.py
# comes after the bridge artifacts are validated.
vivado:
  enabled: true
  board: pynq_z2
  export_hls_ip: true
  generate_project_tcl: true
  run_synth: false
  run_impl: false
  write_bitstream: false
  report_utilization: true
  report_timing: true
  report_power: true
  estimate_energy: true
