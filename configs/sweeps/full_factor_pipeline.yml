name: full_factor_pipeline
description: Full-factor FPGAI HLS sweep over precision, policy, memory, pipeline
  style, parallelism, and tiling. This is generated by repo_audit/sprint22_full_pipeline/make_full_factor_sweep.py.
command_template: PYTHONPATH=. python -B main.py benchmark --config {config_path}
materialize_configs:
  enabled: true
  directory: configs
  strip_unknown_top_level_sections: true
  canonicalize_policy: true
  strip_top_level_sections:
  - notes
  compiler_policy_names: true
  parameter_mappings:
    model_path:
      path: model.path
      create: true
    precision_mode:
      path: analysis.precision_sweep.selected_candidate
      create: true
    policy:
      path: optimization.parallel_policy
      create: true
    memory_strategy:
      path: data_movement.strategy
      create: true
    pe:
      path: optimization.parallel.pe
      create: true
    simd:
      path: optimization.parallel.simd
      create: true
    unroll_factor:
      path: optimization.parallel.unroll_factor
      create: true
    partition_factor:
      path: optimization.parallel.partition_factor
      create: true
    pipeline_style:
      path: optimization.parallel.pipeline_style
      create: true
    conv_tile_oh:
      path: optimization.tiling.conv.tile_oh
      create: true
    conv_tile_ow:
      path: optimization.tiling.conv.tile_ow
      create: true
    conv_tile_oc:
      path: optimization.tiling.conv.tile_oc
      create: true
    conv_tile_ic:
      path: optimization.tiling.conv.tile_ic
      create: true
    dense_tile_in:
      path: optimization.tiling.dense.tile_in
      create: true
    dense_tile_out:
      path: optimization.tiling.dense.tile_out
      create: true
defaults:
  base_config_path: configs/examples/default_compile.yml
  config_path: configs/examples/default_compile.yml
  model_path: models/cnn_mnist.onnx
  board: kv260
  precision_mode: fx8_3
  policy: balanced
  memory_strategy: on_chip
  pe: 1
  simd: 1
  unroll_factor: 1
  partition_factor: 1
  pipeline_style: balanced
design_points:
