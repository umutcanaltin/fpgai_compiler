name: inference_policy
command_template: python main.py benchmark --config {config_path}
design_name_template: policy_{policy}_{precision_mode}
defaults:
  base_config_path: configs/examples/default_compile.yml
  config_path: configs/examples/default_compile.yml
  model_path: models/cnn_mnist.onnx
  board: kv260
  metrics_json: build/fpgai_example_dense/calibration/estimate_vs_hls.json
  precision_mode: fixed
parameters:
  policy:
  - resource_first
  - balanced
  - latency_first
  - throughput_first
  - memory_first
materialize_configs:
  enabled: true
  directory: configs
  canonicalize_policy: true
  strip_top_level_sections:
  - notes
  compiler_policy_names: true
