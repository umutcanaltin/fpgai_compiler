name: communication_ablation
command_template: "python main.py benchmark --config {config_path}"
point_name_template: "comm_{communication_enabled}_{weight_delivery}_{activation_transfer}"
defaults:
  config_path: configs/examples/default_compile.yml
  model_path: models/cnn_mnist.onnx
  board: kv260
parameters:
  communication_enabled: [true, false]
  input_compression_enabled: [true, false]
  weight_delivery: [embedded, streamed, ddr]
  activation_transfer: [raw, compressed]
