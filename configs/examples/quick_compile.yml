version: 1
project:
  name: fpgai_quick_compile
  out_dir: build/fpgai_quick_compile
  clean: true
pipeline:
  mode: inference
  outputs:
    top_kernel_name: deeplearn
training:
  optimizer:
    type: sgd
    learning_rate: 0.01
  loss:
    type: mse
  execution:
    batch_size: 1
    epochs: 1
  storage:
    weights: bram
    activations: bram
    gradients: bram
    optimizer_state: bram
  cache:
    store_forward_activations: true
    store_pre_activations: true
    store_pool_indices: true
    gradient_checkpointing: false
    store_step_snapshots: true
  estimator:
    enabled: true
    include_forward: true
    include_backward_input: true
    include_backward_params: true
    include_update: true
    include_buffers: true
  phase_overrides: {}
targets:
  platform:
    board: kv260
    part: xck26-sfvc784-2LV-c
    clocks:
    - name: pl_clk0
      target_mhz: 200
operators:
  supported:
  - Dense
  - Conv
  - MaxPool
  - AvgPool
  - Add
  - Relu
  - LeakyRelu
  - Sigmoid
  - Softmax
  - BatchNormalization
  - Flatten
  - Reshape
  defaults:
    activation_insert:
      kind: none
      alpha: 0.1
      except_last: true
model:
  format: onnx
  path: models/mlp.onnx
numerics:
  training:
    grad:
      type: ap_fixed
      total_bits: 24
      int_bits: 10
    grad_accum:
      type: ap_fixed
      total_bits: 24
      int_bits: 10
    master_weight:
      type: ap_fixed
      total_bits: 16
      int_bits: 6
    optimizer_state:
      type: ap_fixed
      total_bits: 24
      int_bits: 10
analysis:
  quantization_report:
    enabled: false
    seed: 0
  design_space:
    enabled: false
    print_terminal_summary: true
    recommendation:
      require_prediction_match: true
      min_cosine: 0.999
    performance:
      baseline_cpu_latency_ms: 1.6
  precision_sweep:
    enabled: false
    candidates:
    - name: fx8_3
      defaults:
        activation:
          type: ap_fixed
          total_bits: 8
          int_bits: 3
        weight:
          type: ap_fixed
          total_bits: 8
          int_bits: 3
        bias:
          type: ap_fixed
          total_bits: 16
          int_bits: 6
        accum:
          type: ap_fixed
          total_bits: 16
          int_bits: 6
    - name: fx10_4
      defaults:
        activation:
          type: ap_fixed
          total_bits: 10
          int_bits: 4
        weight:
          type: ap_fixed
          total_bits: 10
          int_bits: 4
        bias:
          type: ap_fixed
          total_bits: 18
          int_bits: 7
        accum:
          type: ap_fixed
          total_bits: 20
          int_bits: 8
    - name: fx12_4
      defaults:
        activation:
          type: ap_fixed
          total_bits: 12
          int_bits: 4
        weight:
          type: ap_fixed
          total_bits: 12
          int_bits: 4
        bias:
          type: ap_fixed
          total_bits: 20
          int_bits: 8
        accum:
          type: ap_fixed
          total_bits: 24
          int_bits: 10
    - name: fx16_6
      defaults:
        activation:
          type: ap_fixed
          total_bits: 16
          int_bits: 6
        weight:
          type: ap_fixed
          total_bits: 16
          int_bits: 6
        bias:
          type: ap_fixed
          total_bits: 24
          int_bits: 10
        accum:
          type: ap_fixed
          total_bits: 24
          int_bits: 10
optimization:
  parallel:
    pe: 2
    simd: 2
    unroll_factor: 2
    partition_factor: 2
    array_partition_mode: cyclic
  pipeline:
    style: balanced
    ii: 2
  tiling:
    dense:
      tile_in: 16
      tile_out: 8
    conv:
      tile_ic: 1
      tile_oc: 2
      tile_oh: 4
      tile_ow: 4

data_movement:
  ps_pl:
    compression:
      enabled: true
    weights:
      mode: embedded
backends:
  hls:
    enabled: false
    vitis:
      enabled: false
      mode: csim
      exe: vitis_hls
  host_cpp:
    enabled: false
debug:
  verbose: false
toolchain:
  vitis_hls:
    enabled: false
    root: /tools/Xilinx/Vitis_HLS/2023.2
    settings64: /tools/Xilinx/Vitis_HLS/2023.2/settings64.sh
    install_dir: /tools/Xilinx/Vitis_HLS/2023.2
benchmark:
  enabled: false
  fail_on_mismatch: true
  seed: 0
  compare:
    atol: 0.08
    rtol: 0.08
    max_abs_error: 0.08
    mean_abs_error: 0.03
    rmse: 0.04
    require_argmax_match: false
    min_cosine_similarity: 0.95
  intermediate:
    enabled: true
    fail_on_layer_mismatch: false
    stop_on_first_bad_layer: false
memory:
  storage:
    weights: bram
    activations: bram
    gradients: bram
    optimizer_state: bram
