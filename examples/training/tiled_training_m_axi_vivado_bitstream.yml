version: 1
project:
  name: example_tiled_training_m_axi_vivado_bitstream
  out_dir: build/examples/tiled_training_m_axi_vivado_bitstream
  clean: true
pipeline:
  mode: training_on_device
  outputs:
    top_kernel_name: deeplearn
model:
  format: onnx
  path: models/mlp.onnx
targets:
  platform:
    board: kv260
    part: xck26-sfvc784-2LV-c
    clocks:
    - name: pl_clk0
      target_mhz: 200
toolchain:
  vitis_hls:
    settings64: /tools/Xilinx/Vitis_HLS/2023.2/settings64.sh
    executable: vitis_hls
  vivado:
    settings64: /tools/Xilinx/Vivado/2023.2/settings64.sh
    executable: vivado
weights:
  mode: import_export
memory:
  weight_storage: ddr
  activation_storage: bram
  gradient_storage: bram
  optimizer_state_storage: bram
data_movement:
  inputs:
    interface: m_axi
    transport: ps_runtime
    tiled:
      enabled: true
      tile_size: 64
  weights:
    import:
      interface: m_axi
      transport: ps_runtime
      policy: tiled
      tile_size: 64
    export:
      interface: m_axi
      transport: ps_runtime
      policy: tiled
      tile_size: 64
  labels:
    interface: m_axi
    transport: ps_runtime
    tiled:
      enabled: true
      tile_size: 64
  outputs:
    interface: m_axi
    transport: ps_runtime
    tiled:
      enabled: true
      tile_size: 64
  gradients:
    export:
      interface: m_axi
      transport: ps_runtime
      policy: tiled
      tile_size: 64
runtime:
  sequence:
  - run_training
  - export_gradients
optimization:
  pipeline:
    style: balanced
    ii: 1
  parallel:
    pe: 1
    simd: 1
    unroll_factor: 1
    partition_factor: 1
    array_partition_mode: none
build:
  stages:
    cpp: true
    host_cpp: true
    testbench: true
    hls_project: true
    hls_synthesis: true
    vivado_project: true
    vivado_implementation: true
    bitstream: true
    runtime_package: true
    reports: true
operators:
  supported:
  - Dense
  - Conv
  - MaxPool
  - AvgPool
  - Add
  - Relu
  - LeakyRelu
  - Sigmoid
  - Softmax
  - BatchNormalization
  - Flatten
  - Reshape
  defaults:
    activation_insert:
      kind: none
      alpha: 0.1
      except_last: true
training:
  optimizer:
    type: sgd
    learning_rate: 0.01
  loss:
    type: mse
  batch:
    size: 1
    epochs: 1
  accumulation:
    steps: 1
    mode: none
