version: 1
project:
  name: example_cnn_m_axi_input
  out_dir: build/examples/cnn_m_axi_input
  clean: true
pipeline:
  mode: inference
  outputs:
    top_kernel_name: deeplearn
model:
  format: onnx
  path: models/cnn_mnist.onnx
targets:
  platform:
    board: kv260
    part: xck26-sfvc784-2LV-c
    clocks:
    - name: pl_clk0
      target_mhz: 200
weights:
  mode: embedded
memory:
  weight_storage: bram
  activation_storage: bram
  gradient_storage: bram
  optimizer_state_storage: bram
data_movement:
  inputs:
    interface: m_axi
    transport: ps_runtime
    tiled:
      enabled: false
  outputs:
    interface: m_axi
    transport: ps_runtime
    tiled:
      enabled: false
runtime:
  sequence:
  - run_inference
optimization:
  pipeline:
    style: balanced
    ii: 1
  parallel:
    pe: 1
    simd: 1
    unroll_factor: 1
    partition_factor: 1
    array_partition_mode: none
build:
  stages:
    cpp: true
    testbench: true
    hls_project: false
    hls_synthesis: false
    vivado_project: false
    vivado_implementation: false
    bitstream: false
    runtime_package: true
    reports: true
operators:
  supported:
  - Dense
  - Conv
  - MaxPool
  - AvgPool
  - Add
  - Relu
  - LeakyRelu
  - Sigmoid
  - Softmax
  - BatchNormalization
  - Flatten
  - Reshape
  defaults:
    activation_insert:
      kind: none
      alpha: 0.1
      except_last: true
