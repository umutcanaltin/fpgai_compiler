name: CI

on:
  push:
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Import smoke test
        run: |
          python - <<'PY'
          import fpgai
          from fpgai.cli import main
          from fpgai.config.loader import load_config
          from fpgai.engine.compiler import Compiler

          print("FPGAI import OK")
          PY

      - name: Check formatting
        run: |
          black --check fpgai tests main.py

      - name: Run Ruff
        run: |
          ruff check fpgai tests main.py

      - name: Run fast tests
        run: |
          pytest -q -m "not integration"